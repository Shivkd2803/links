<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #080808;
  --card: #0f0f0f;
  --border: rgba(255,255,255,0.07);
  --text: #ede8e0;
  --muted: #666;
}
html, body { height: 100%; }
body {
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

/* Desktop backdrop */
.backdrop {
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(200,169,126,0.09) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 90%, rgba(80,100,140,0.08) 0%, transparent 55%),
    #080808;
  z-index: 0; pointer-events: none;
}
.backdrop::after {
  content: ''; position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  background-size: 200px;
}

/* Card */
.card {
  position: relative; z-index: 1;
  width: 100%; max-width: 440px;
  background: var(--card);
  min-height: 100vh;
  display: flex; flex-direction: column;
}
@media (min-width: 501px) {
  body { padding: 48px 20px; }
  .card {
    min-height: unset;
    border: 1px solid var(--border);
    border-radius: 28px;
    box-shadow: 0 40px 120px rgba(0,0,0,0.85), 0 8px 32px rgba(0,0,0,0.5);
    overflow: hidden;
  }
}
@media (max-width: 500px) {
  .backdrop { display: none; }
  body { padding: 0; }
  .card { border-radius: 0; border: none; box-shadow: none; overflow: hidden; }
}

/* ══ HERO — taller ══ */
.hero {
  position: relative;
  height: 75vw;
  max-height: 500px;
  min-height: 320px;
  overflow: hidden; flex-shrink: 0;
}

/* Real photo — swap placeholder div for this */
.hero-photo {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center top;
  display: block;
  filter: grayscale(18%) contrast(1.06);
}

/* Placeholder silhouette */
.hero-placeholder {
  width: 100%; height: 100%;
  background: linear-gradient(160deg, #1e1e1e 0%, #141414 50%, #0c0c0c 100%);
  display: flex; align-items: center; justify-content: center;
}
.hero-placeholder svg { opacity: 0.11; width: 110px; }

/* Seamless bottom fade into card */
.hero::after {
  content: ''; position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 60%;
  background: linear-gradient(to bottom, transparent 0%, var(--card) 100%);
  pointer-events: none; z-index: 2;
}

/* JS scroll-to-black */
.hero-mask {
  position: absolute; inset: 0;
  background: var(--card);
  opacity: 0; pointer-events: none; z-index: 3;
}

/* ── FISHEYE ICONS — float inside hero ── */
.fisheye-bar {
  position: absolute;
  bottom: 16px; left: 0; right: 0;
  display: flex; justify-content: center; gap: 12px;
  z-index: 10;
}
.fisheye-bar a {
  width: 42px; height: 42px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  text-decoration: none;
  transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.22s ease;
  animation: floatBob 6s ease-in-out infinite;
  will-change: transform;
}
.fisheye-bar a:nth-child(1){animation-delay:0s;    animation-duration:5.8s}
.fisheye-bar a:nth-child(2){animation-delay:-1.1s; animation-duration:6.4s}
.fisheye-bar a:nth-child(3){animation-delay:-2.1s; animation-duration:5.5s}
.fisheye-bar a:nth-child(4){animation-delay:-0.6s; animation-duration:6.9s}
.fisheye-bar a:nth-child(5){animation-delay:-3s;   animation-duration:6.2s}
.fisheye-bar a:nth-child(6){animation-delay:-1.7s; animation-duration:5.4s}
@keyframes floatBob {
  0%,100%{ transform: translateY(0) translateX(0) }
  25%    { transform: translateY(-6px) translateX(2px) }
  50%    { transform: translateY(-10px) translateX(-2px) }
  75%    { transform: translateY(-5px) translateX(3px) }
}
.fisheye-bar a:hover {
  transform: scale(1.65) translateY(-8px) !important;
  box-shadow: 0 14px 32px rgba(0,0,0,0.65);
  animation-play-state: paused;
  z-index: 20;
}
.fisheye-bar a.nb { transform: scale(1.3) translateY(-4px) !important; }
.fisheye-bar a svg { width: 18px; height: 18px; display: block; }

.soc-be { background: #1769ff; }
.soc-ig { background: linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); }
.soc-li { background: #0077b5; }
.soc-yt { background: #ff0000; }
.soc-tt { background: #111; border: 1px solid #333; }
.soc-lm { background: linear-gradient(135deg,#f06,#c36); }

/* ══ CONTENT — name/handle/bio only ══ */
.content {
  position: relative; z-index: 4;
  background: var(--card);
  padding: 0 26px 48px;
  margin-top: -2px;
  text-align: center;
}
.profile-name {

  font-size: 2.1rem; font-weight: 900;
  letter-spacing: -0.5px; color: #fff;
  padding-top: 22px; line-height: 1.1;
}
.profile-handle {
  font-size: 0.8rem; color: var(--muted);
  letter-spacing: 0.1em; margin: 5px 0 14px;
}
.bio {
  font-size: 0.9rem;
  color: rgba(255,255,255,0.28);
  letter-spacing: 0.06em;
}

.footer {
  margin-top: 40px;
  font-size: 0.67rem; color: rgba(255,255,255,0.12); letter-spacing: 0.08em;
}
</style>

<script>
// Scroll-to-black blend
const hero = document.getElementById('hero');
const heroMask = document.getElementById('heroMask');
window.addEventListener('scroll', () => {
  const h = hero.offsetHeight;
  const p = Math.min(Math.max((window.scrollY - h * 0.1) / (h * 0.65), 0), 1);
  heroMask.style.opacity = p;
}, { passive: true });

// Fisheye neighbour magnify
const icons = Array.from(document.querySelectorAll('.fisheye-bar a'));
icons.forEach((icon, i) => {
  icon.addEventListener('mouseenter', () => {
    icons.forEach((o, j) => {
      o.classList.remove('nb');
      if (Math.abs(i - j) === 1) o.classList.add('nb');
    });
  });
  icon.addEventListener('mouseleave', () => {
    icons.forEach(o => o.classList.remove('nb'));
  });
});
</script>
