<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntrovertFimmaker | Linktree</title>
    <link rel="icon" type="image/png" href="moe.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --card: #000000;
            --border: rgba(255, 255, 255, 0.08);
            --muted: #666;
        }

        html,
        body {
            height: 100%;
            background: #080808;
            font-family: 'DM Sans', sans-serif;
            color: #ede8e0;
        }

        /* ── FULL PAGE BLURRED PHOTO BACKDROP (desktop/tablet) ── */
        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            position: relative;
        }

        /* The blurred bg — same photo, stretched and blurred */
        .bg-blur {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-blur img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            filter: blur(32px) brightness(0.35) saturate(0.7);
            transform: scale(1.08);
            /* hide blur edges */
        }

        /* extra dark vignette on top */
        .bg-blur::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center,
                    rgba(0, 0, 0, 0.25) 0%,
                    rgba(0, 0, 0, 0.55) 100%);
        }

        /* ── CARD ── */
        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            background: var(--card);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* iPad */
        @media (min-width: 600px) {
            .card {
                max-width: 520px;
            }
        }

        /* iPad Pro / small laptops */
        @media (min-width: 900px) {
            .card {
                max-width: 600px;
            }
        }

        /* laptops */
        @media (min-width: 1200px) {
            .card {
                max-width: 680px;
            }
        }

        /* hide scrollbar but keep scrolling */
        .card::-webkit-scrollbar {
            display: none;
        }

        .card {
            -ms-overflow-style: none;
            /* IE/Edge */
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            /* Firefox */
        }

        /* Hide scrollbar on desktop/tablet but allow scroll */
        @media (min-width: 501px) {

            html,
            body {
                scrollbar-width: none;
                -ms-overflow-style: none;
            }

            body::-webkit-scrollbar {
                display: none;
            }

        }

        @media (min-width: 501px) {
            body {
                padding: 48px 20px;
                align-items: flex-start;
            }

            .card {
                min-height: calc(100vh - 96px);
                border: 1px solid var(--border);
                border-radius: 28px;
                overflow: hidden;
                box-shadow: 0 40px 120px rgba(0, 0, 0, 0.9), 0 8px 32px rgba(0, 0, 0, 0.6);
            }
        }

        @media (max-width: 500px) {

            html,
            body {
                overflow: hidden;
                height: 100%;
            }

            .card {
                height: 100vh;
                overflow-y: auto;
            }

        }

        @media (max-width: 500px) {
            body {
                padding: 0;
            }

            .bg-blur {
                display: none;
            }

            .card {
                border-radius: 0;
                border: none;
                box-shadow: none;
                height: 100vh;
                overflow-y: auto;
                /* FIX */
            }
        }

        .hero-overlay {
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
        }

        .hero .profile-name {
            padding-top: 0;
            font-size: 2rem;
        }

        .hero .profile-handle {
            margin-top: 4px;
        }

        /* ══ HERO ══ */
        .hero {
            position: relative;
            height: 75vw;
            max-height: 500px;
            min-height: 400px;
            overflow: hidden;
            flex-shrink: 0;
        }

        /* Real photo */
        .hero-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
            filter: grayscale(15%) contrast(1.06);
        }

        /* Placeholder */
        .hero-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(160deg, #1e1e1e 0%, #141414 55%, #0c0c0c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-placeholder svg {
            opacity: 0.1;
            width: 110px;
        }

        /* Gradient fade bottom of hero into card */
        .hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 62%;
            background: linear-gradient(to bottom, transparent 0%, var(--card) 100%);
            pointer-events: none;
            z-index: 2;
        }

        /* JS scroll-to-black */
        .hero-mask {
            position: absolute;
            inset: 0;
            background: var(--card);
            opacity: 0;
            pointer-events: none;
            z-index: 3;
        }

        /* ── FISHEYE FLOATING ICONS ── */
        .fisheye-bar {
            position: relative;
            margin: 14px 0 6px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .fisheye-bar a {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.22s ease;
            animation: floatBob 6s ease-in-out infinite;
            will-change: transform;
        }

        .fisheye-bar a:nth-child(1) {
            animation-delay: 0s;
            animation-duration: 5.8s;
        }

        .fisheye-bar a:nth-child(2) {
            animation-delay: -1.1s;
            animation-duration: 6.4s;
        }

        .fisheye-bar a:nth-child(3) {
            animation-delay: -2.1s;
            animation-duration: 5.5s;
        }

        .fisheye-bar a:nth-child(4) {
            animation-delay: -0.6s;
            animation-duration: 6.9s;
        }

        .fisheye-bar a:nth-child(5) {
            animation-delay: -3s;
            animation-duration: 6.2s;
        }

        .fisheye-bar a:nth-child(6) {
            animation-delay: -1.7s;
            animation-duration: 5.4s;
        }

        @keyframes floatBob {

            0%,
            100% {
                transform: translateY(0) translateX(0);
            }

            25% {
                transform: translateY(-6px) translateX(2px);
            }

            50% {
                transform: translateY(-11px) translateX(-2px);
            }

            75% {
                transform: translateY(-5px) translateX(3px);
            }
        }

        .fisheye-bar a:hover {
            transform: scale(1.15) translateY(-2px) !important;
            box-shadow: 0 14px 32px rgba(0, 0, 0, 0.65);
            animation-play-state: paused;
            z-index: 20;
        }

        .fisheye-bar a.nb {
            transform: scale(1.3) translateY(-4px) !important;
        }

        .fisheye-bar a svg {
            width: 14px;
            height: 14px;
            display: block;
        }

        .soc-be {
            background: #1769ff;
        }

        .soc-ig {
            background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        .soc-blk {
            background: #FF5722;
        }

        .soc-li {
            background: #0077b5;
        }

        .soc-yt {
            background: #ff0000;
        }

        .soc-tt {
            background: #111;
            border: 1px solid #333;
        }

        .soc-lm {
            background: linear-gradient(135deg, #f06, #c36);
        }

        /* ══ SCROLLABLE MIDDLE ══ */
        .content {
            position: relative;
            z-index: 4;
            background: var(--card);
            /* flex: 1 pushes footer to bottom */
            display: flex;
            flex-direction: column;
            padding: 0 26px 0;
            margin-top: -2px;
            text-align: center;
        }

        .content {
            flex: 1 0 auto;
            min-height: min-content;
        }

        .profile-name {
            font-family: 'Inter', sans-serif;
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: #fff;
            padding-top: 22px;
            line-height: 1.1;
        }

        .profile-handle {
            display: inline-block;
            font-family: 'Great Vibes', cursive;
            font-size: 1rem;
            color: rgba(255, 255, 255, .6);
            margin-top: 4px;
            text-decoration: none;
            transition: color 0.2s ease, transform 0.2s ease;
        }



        .bio {
            font-family: 'Inter', sans-serif;
            font-size: .9rem;
            color: rgba(255, 255, 255, .45);
            margin-bottom: 24px;
        }

        /* Spacer pushes footer down */
        .spacer {
            flex: 1;
        }

        /* ── FOOTER — always pinned to bottom of card ── */
        .footer {
            margin-top: 40px;
            padding: 18px 0 22px;

            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;

        }

        .footer-logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #555, #222);
            border: 2px solid #333;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .footer-avatar svg {
            width: 14px;
            opacity: 0.5;
        }

        .footer-me-badge {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f06, #c36);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: -10px;
            border: 2px solid var(--card);
            font-size: 0.6rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.02em;
        }

        .footer-text {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.02em;
        }

        .footer-text strong {
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
        }

        .footer-links {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 0.04em;
        }

        .footer-links a {
            color: inherit;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .footer-links a:hover {
            color: rgba(255, 255, 255, 0.5);
        }

        .tabs {
            position: relative;
            display: flex;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            letter-spacing: .02em;
            font-size: .85rem;
            justify-content: center;
            gap: 22px;
            margin-top: 14px;
            font-size: 0.85rem;
            letter-spacing: 0.04em;
        }

        .tab {
            color: rgba(255, 255, 255, 0.45);
            cursor: pointer;
            padding-bottom: 6px;
        }

        .tab.active {
            color: rgba(255, 255, 255, 0.75);
            /* not full white */
        }

        .tab-underline {
            position: absolute;
            bottom: 0;
            height: 1.5px;
            width: 0;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 2px;
            transition: all .28s cubic-bezier(.4, 0, .2, 1);
        }

        .tab-content {
            position: relative;
            overflow: hidden;
            margin-top: 40px;
        }

        .tab-panel {
            display: flex;
            flex-direction: column;
            gap: 14px;
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            transform: translateX(40px);
            transition: all .45s cubic-bezier(.22, .61, .36, 1);
            pointer-events: none;
        }

        .tab-panel.active {
            position: relative;
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        /* work card */
        .work-card {
            width: 100%;
            border-radius: 18px;
            overflow: hidden;
            background: #111;
        }

        .work-card img,
        .work-card video {
            width: 100%;
            display: block;
            object-fit: cover;
        }

        .default-grid {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
            opacity: .75;
            flex-wrap: wrap;
        }

        .default-grid img {
            width: 206px;
            height: 206px;
            object-fit: cover;
            border-radius: 12px;
            filter: grayscale(20%);
        }
    </style>
</head>

    <script>
        // ── Scroll-to-black ──
        const hero = document.getElementById('hero');
        const heroMask = document.getElementById('heroMask');
        const card = document.querySelector('.card');

        function handleScroll(scrollTop) {
            const h = hero.offsetHeight;
            const p = Math.min(Math.max((scrollTop - h * 0.1) / (h * 0.65), 0), 1);
            heroMask.style.opacity = p;
        }

        // mobile (card scroll)
        card.addEventListener('scroll', () => {
            handleScroll(card.scrollTop);
        });

        // desktop (page scroll)
        window.addEventListener('scroll', () => {
            handleScroll(window.scrollY);
        });

        // ── Fisheye neighbours ──
        const icons = Array.from(document.querySelectorAll('.fisheye-bar a'));
        icons.forEach((icon, i) => {
            icon.addEventListener('mouseenter', () => {
                icons.forEach((o, j) => {
                    o.classList.remove('nb');
                    if (Math.abs(i - j) === 1) o.classList.add('nb');
                });
            });
            icon.addEventListener('mouseleave', () => icons.forEach(o => o.classList.remove('nb')));
        });

        // ── Auto sync blurred background with hero profile photo ──
        const heroImg = document.querySelector('.hero-photo');
        const bgBlur = document.querySelector('.bg-blur');

        function syncBackground() {
            if (!heroImg || !bgBlur) return;

            const src = heroImg.getAttribute('src');
            if (!src) return;

            bgBlur.innerHTML = `<img src="${src}" alt="">`;
        }

        // run when image loads
        if (heroImg.complete) {
            syncBackground();
        } else {
            heroImg.addEventListener('load', syncBackground);
        }

        // also update if you ever change hero image dynamically
        const observer = new MutationObserver(syncBackground);
        observer.observe(heroImg, { attributes: true, attributeFilter: ['src'] });


        const tabs = document.querySelectorAll('.tab');
        const underline = document.querySelector('.tab-underline');

        function moveUnderline(el) {
            underline.style.width = el.offsetWidth + 'px';
            underline.style.left = el.offsetLeft + 'px';
        }

        // initial
        moveUnderline(document.querySelector('.tab.active'));

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                moveUnderline(tab);
            });
        });

        window.addEventListener('resize', () => {
            moveUnderline(document.querySelector('.tab.active'));
        });

        document.addEventListener('DOMContentLoaded', () => {

            const tabs = document.querySelectorAll('.tab');
            const panels = document.querySelectorAll('.tab-panel');
            const underline = document.querySelector('.tab-underline');

            function moveUnderline(el) {
                if (!underline || !el) return;
                underline.style.width = el.offsetWidth + 'px';
                underline.style.left = el.offsetLeft + 'px';
            }

            tabs.forEach((tab, i) => {
                tab.addEventListener('click', () => {

                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');

                    panels.forEach(p => p.classList.remove('active'));
                    if (panels[i]) panels[i].classList.add('active');

                    moveUnderline(tab);
                });
            });

            moveUnderline(document.querySelector('.tab.active'));

            window.addEventListener('resize', () => {
                moveUnderline(document.querySelector('.tab.active'));
            });

        });

        document.querySelectorAll('.tab-panel').forEach(panel => {
            const works = panel.querySelectorAll('.work-card');
            const defaults = panel.querySelector('.default-grid');

            if (works.length > 0) {
                defaults.style.display = "none";
            }
        });
    </script>
</body>

</html>
